<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Title */
h2 {
    text-align: center;
    color: white;
    padding: 20px;
}

/* Complaint Box (WIDE) */
.complaint-box {
    background: white;
    width: 80%;
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

textarea {
    width: 95%;
    height: 120px;
    border-radius: 10px;
    padding: 10px;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

/* GRID CENTER */
.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
}

/* Card */
.card {
    background: white;
    border-radius: 15px;
    width: 220px;
    text-align: center;
    padding: 10px;
    transition: 0.3s;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

.card:hover {
    transform: scale(1.08);
}

/* IMAGE FIX (FULL SHOW) */
.card img {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    object-fit: contain; /* 🔥 IMPORTANT */
    background: #f5f5f5;
}

/* Text */
.card p {
    margin-top: 10px;
    font-weight: bold;
}

/* Remove underline */
a {
    text-decoration: none;
    color: black;
}
</style>

</head>
<body>

<h2>🏠 Dashboard</h2>

<!-- 🔥 Complaint TOP -->
<div class="complaint-box">
    <h3>📢 Submit Complaint</h3>

    <form method="POST" action="/submit_complaint">
        <textarea name="complaint" placeholder="Write your complaint..." required></textarea>
        <button type="submit">Submit</button>
    </form>
</div>
<h3 style="text-align:center; color:white;">📋 Your Complaints</h3>

<div style="width: 80%; margin: auto;">

{% for c in complaints %}
<div style="background:white; padding:10px; margin:10px; border-radius:10px;">
    <p><b>Complaint:</b> {{c[0]}}</p>
    <p><b>Status:</b> {{c[1]}}</p>
</div>
{% endfor %}

</div>

<!-- 🔥 CARDS -->
<div class="grid">

<a href="/menu">
<div class="card">
<img src="https://sumitbaroniya.github.io/Hostel-Food-Saving-Management-System/images/img/2.png">
<p>🍽 Menu</p>
</div>
</a>

<a href="/bill">
<div class="card">
<img src="https://tse3.mm.bing.net/th/id/OIP.uNySxDDpMxiSXOeFffR1vwHaHa">
<p>💰 Bills</p>
</div>
</a>

<a href="/profile">
<div class="card">
<img src="https://static.vecteezy.com/system/resources/previews/041/379/814/non_2x/male-profile-icon-vector.jpg">
<p>👤 Profile</p>
</div>
</a>

<a href="/help">
<div class="card">
<img src="https://tse4.mm.bing.net/th/id/OIP.bde-MPRw-2ALDIqpjjBjpAHaHa">
<p>🛠 Help</p>
</div>
</a>

<a href="/logout">
<div class="card">
<img src="https://tse2.mm.bing.net/th/id/OIP.eWqY1hPQidmsZjo0XP8tpwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
<p>🚪 Logout</p>
</div>
</a>

<a href="/view_complaints">
<div class="card">
<img src="https://tse3.mm.bing.net/th/id/OIP.glP0QtnQhXI3f3NPOhBCOwHaE8?w=6000&h=4000&rs=1&pid=ImgDetMain&o=7&rm=3">
<p>📋 My Complaints</p>
</div>
</a>

<a href="/leave">
<div class="card">
<img src="https://tse2.mm.bing.net/th/id/OIP.eWqY1hPQidmsZjo0XP8tpwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3.jpg">
<p>📝 Apply Leave</p>
</div>
</a>

<a href="/my_leaves">
<div class="card">
    <img src="https://static.vecteezy.com/system/resources/previews/030/998/871/non_2x/leave-icon-vector.jpg">
<p>📋 My Leaves</p>
</div>
</a>

</div>

</body>
</html>
